dataset:
  dataset_path: /home/voxter/Code/PSDCodec/data/processed/demo_prepared_83c8c79e8b33.npz
  source_format: npz
  frames_key: frames
  frequency_grid_key: frequency_grid_hz
  noise_floor_key: noise_floors
  noise_floor_window: null
  noise_floor_percentile: 10.0
  validation_fraction: 0.2
  shuffle: true
  seed: 0
  campaign_include_globs:
  - '*'
  campaign_exclude_globs: []
  campaign_node_globs:
  - Node*.csv
  campaign_target_bin_count: null
  campaign_value_scale: db_to_power
  campaign_max_frames: null
runtime:
  preprocessing:
    reduced_bin_count: 1024
    resolution_factor: null
    dynamic_range_offset: 1.0e-06
    block_count: 32
    stability_epsilon: 1.0e-06
    mean_quantizer:
      minimum: -20.0
      maximum: 40.0
      bits: 12
    log_sigma_quantizer:
      minimum: -12.0
      maximum: 8.0
      bits: 10
  entropy_model:
    alphabet_size: 512
    precision_bits: 12
    pseudo_count: 1.0
  packet_format:
    magic: PSDC
    version: 1
model:
  reduced_bin_count: 1024
  latent_vector_count: 512
  embedding_dim: 8
  codebook_size: 512
  hidden_dim: 128
  residual_block_count: 4
  convolution_kernel_size: 7
  commitment_weight: 0.25
training:
  epoch_count: 100
  batch_size: 128
  learning_rate: 0.0002
  weight_decay: 1.0e-05
  gradient_clip_norm: 1.0
  device: cuda
  mixed_precision: auto
  enable_model_compile: true
  allow_tf32: true
  data_loader_worker_count: null
  pin_memory: null
  prefetch_factor: 4
  persistent_data_loader_workers: true
  random_seed: 0
  loss:
    psd_weight: 5.0
    rate_weight: 2.0e-05
    vq_weight: 1.0
    task_weight: 0.05
artifacts:
  experiment_name: demo
  checkpoint_root: models/checkpoints
  export_root: models/exports
  export_onnx: true
  save_latest_checkpoint: true
  latest_checkpoint_interval: 10
  save_best_checkpoint: true
  selection_metric: validation_deployment_score
  require_selection_to_beat_preprocessing: true
task:
  occupancy_margin: 5.0e-06
  occupancy_temperature: 2.5e-06
  occupancy_positive_weight: 2.0
  occupancy_negative_weight: 1.0
  smoothing_window_bins: 5
  huber_delta: 100000.0
  peak_weight: 1.0e-11
  peak_power_weight: 1.0
  centroid_weight: 0.0
  bandwidth_weight: 0.0
  occupancy_weight: 0.5
  feature_weight: 2.0
