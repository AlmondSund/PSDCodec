dataset:
  dataset_path: data/raw/campaigns
  source_format: campaigns
  frames_key: frames
  frequency_grid_key: frequency_grid_hz
  noise_floor_key:
  noise_floor_window: 32
  noise_floor_percentile: 10.0
  validation_fraction: 0.2
  shuffle: true
  seed: 0
  campaign_include_globs:
    - "*"
  campaign_exclude_globs: []
  campaign_node_globs:
    - "Node*.csv"
  campaign_target_bin_count: 4096
  campaign_value_scale: db_to_power
  campaign_max_frames:

runtime:
  preprocessing:
    reduced_bin_count: 128
    resolution_factor:
    dynamic_range_offset: 1.0e-6
    block_count: 8
    stability_epsilon: 1.0e-6
    mean_quantizer:
      minimum: -20.0
      maximum: 40.0
      bits: 12
    log_sigma_quantizer:
      minimum: -12.0
      maximum: 8.0
      bits: 10
  entropy_model:
    alphabet_size: 128
    precision_bits: 12
    pseudo_count: 1.0
  packet_format:
    magic: PSDC
    version: 1

model:
  reduced_bin_count: 128
  latent_vector_count: 32
  embedding_dim: 8
  codebook_size: 128
  hidden_dim: 256
  commitment_weight: 0.25

training:
  epoch_count: 50
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0
  gradient_clip_norm: 1.0
  device: cpu
  loss:
    psd_weight: 1.0
    rate_weight: 0.01
    vq_weight: 1.0
    task_weight: 0.0

artifacts:
  experiment_name: baseline_psdcodec
  checkpoint_root: models/checkpoints
  export_root: models/exports
  export_onnx: true
  save_latest_checkpoint: true
  save_best_checkpoint: true

task:
