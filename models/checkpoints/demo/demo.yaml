dataset:
  dataset_path: data/raw/campaigns
  source_format: campaigns
  frames_key: frames
  frequency_grid_key: frequency_grid_hz
  noise_floor_key:
  noise_floor_window: 32
  noise_floor_percentile: 10.0
  validation_fraction: 0.2
  shuffle: true
  seed: 0
  campaign_include_globs:
    - "*"
  campaign_exclude_globs: []
  campaign_node_globs:
    - "Node*.csv"
  campaign_target_bin_count: 4096
  campaign_value_scale: db_to_power
  campaign_max_frames:

runtime:
  preprocessing:
    # The manuscript's example task depends on narrow-peak occupancy and feature
    # preservation, so the reduced spectral support is kept wider than the baseline.
    reduced_bin_count: 256
    resolution_factor:
    dynamic_range_offset: 1.0e-6
    block_count: 8
    stability_epsilon: 1.0e-6
    mean_quantizer:
      minimum: -20.0
      maximum: 40.0
      bits: 12
    log_sigma_quantizer:
      minimum: -12.0
      maximum: 8.0
      bits: 10
  entropy_model:
    alphabet_size: 256
    precision_bits: 12
    pseudo_count: 1.0
  packet_format:
    magic: PSDC
    version: 1

model:
  reduced_bin_count: 256
  latent_vector_count: 64
  embedding_dim: 8
  codebook_size: 256
  hidden_dim: 512
  commitment_weight: 0.25

training:
  # This canonical demo run prioritizes PSD and task fidelity over aggressive rate
  # minimization so the first export reflects the manuscript's sensing example.
  epoch_count: 100
  batch_size: 32
  learning_rate: 5.0e-4
  weight_decay: 1.0e-5
  gradient_clip_norm: 1.0
  device: auto
  loss:
    psd_weight: 1.0
    rate_weight: 0.001
    vq_weight: 1.0
    task_weight: 0.1

artifacts:
  experiment_name: demo
  checkpoint_root: models/checkpoints
  export_root: models/exports
  export_onnx: true
  save_latest_checkpoint: true
  save_best_checkpoint: true

task:
  # Manuscript example: occupancy consistency + feature preservation.
  # These values are in linear-power units, derived from observed campaign frame and
  # noise-floor deltas rather than from dB magnitudes. The feature penalties operate
  # on raw Hz features, so their weights explicitly normalize the frequency scales.
  occupancy_margin: 5.0e-6
  occupancy_temperature: 2.5e-6
  occupancy_positive_weight: 2.0
  occupancy_negative_weight: 1.0
  smoothing_window_bins: 5
  huber_delta: 100000.0
  peak_weight: 7.5e-13
  centroid_weight: 3.0e-12
  bandwidth_weight: 7.5e-10
  occupancy_weight: 1.0
  feature_weight: 1.0
